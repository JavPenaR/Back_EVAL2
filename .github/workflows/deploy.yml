name: Deploy Backend Innovatech
on:
  push:
    branches: [ deploy ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Backend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/innovatech-back:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/innovatech-back:latest

      - name: Deploy via Proxy (Jump Host)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          proxy_host: ${{ secrets.EC2_PROXY_HOST }}
          proxy_username: ec2-user
          proxy_key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo docker pull ${{ secrets.DOCKER_USERNAME }}/innovatech-back:latest
            sudo docker stop back-app || true
            sudo docker rm back-app || true
            # MAGIA INGE SENIOR: Le agregamos --restart always por si se tropieza
            sudo docker run -d --name back-app -p 3000:3000 --restart always -e PORT=3000 -e DB_HOST=10.0.2.241 -e DB_USER=root -e DB_PASSWORD=Caltias8 -e DB_NAME=proyecto_db -e DB_PORT=3306 ${{ secrets.DOCKER_USERNAME }}/innovatech-back:latest