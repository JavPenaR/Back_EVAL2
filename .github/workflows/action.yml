name: Build Back Triggered by Front

on:
  repository_dispatch:
    types:
      - front-actualizado

jobs:
  build-back:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar código del backend
        uses: actions/checkout@v4

      - name: Iniciar sesión en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Construir y publicar imagen del backend
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/backend-service:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/backend-service:${{ github.sha }}

      - name: Mostrar relación con el frontend
        run: |
          echo "Backend construido por cambio en frontend"
          echo "Commit frontend: ${{ github.event.client_payload.front_commit }}"
          echo "Imagen frontend: ${{ github.event.client_payload.front_image }}"