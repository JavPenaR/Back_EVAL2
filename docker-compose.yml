version: '3.8'

services:
  # 1. Servicio de Base de Datos
  database:
    image: donmatii/innovatech-db:latest
    container_name: db-app-local
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=Caltias8
      - MYSQL_DATABASE=proyecto_db
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - innovatech-network

  # 2. Servicio Backend
  backend:
    image: donmatii/innovatech-back:latest
    container_name: back-app-local
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - DB_HOST=database
      - DB_USER=root
      - DB_PASSWORD=Caltias8
      - DB_NAME=proyecto_db
      - DB_PORT=3306
    depends_on:
      - database
    networks:
      - innovatech-network

  # 3. Servicio Frontend
  frontend:
    image: donmatii/innovatech-front:latest
    container_name: front-app-local
    ports:
      - "80:5000"
    environment:
      - BACKEND_URL=http://backend:3000
    depends_on:
      - backend
    networks:
      - innovatech-network

# Definición del volumen de persistencia
volumes:
  mysql_data:

# Definición de la red interna de los contenedores
networks:
  innovatech-network:
    driver: bridge